<div class="form-group">
    <label for="url" class="form-label">Image URL:</label>
    <input type="text" id="url" name="url" placeholder="Type something..." required class="form-input">
</div>

<div class="form-group">
    <label for="fitMode" class="form-label">Display Mode</label>
    <select id="fitMode" name="fitMode" class="form-input">
        <option value="fit">Fit (Letterbox - Full image visible)</option>
        <option value="fill">Fill (Crop - No black bars)</option>
    </select>
    <small style="display: block; margin-top: 5px; color: #666;">
        Fit: Shows entire image with black bars if needed<br>
        Fill: Crops edges to fill screen completely
    </small>
</div>

<div class="form-group">
    <span style="color: var(--text-primary);">Warning: Do not run with untrusted URLs, as it may pose a security risk. This may also fail if the image takes too long to load.</span>
</div>

<script>
    // populate form values from plugin settings
    document.addEventListener('DOMContentLoaded', () => {
        if (loadPluginSettings) {
            document.getElementById('url').value = pluginSettings.url;
            document.getElementById('fitMode').value = pluginSettings.fitMode || 'fit';
        }
    });
</script>
