<div class="form-group">
    <label for="autoRefresh" class="form-label">Auto Refresh:</label>
    <select id="autoRefresh" name="autoRefresh" class="form-input">
        <option value="0">Off</option>
        <option value="1">Every 1 minute</option>
        <option value="2">Every 2 minutes</option>
        <option value="5" selected>Every 5 minutes</option>
        <option value="10">Every 10 minutes</option>
        <option value="30">Every 30 minutes</option>
    </select>
    <small style="display: block; margin-top: 4px; color: var(--text-secondary, #666);">How often to re-capture the page while this plugin is displayed</small>
</div>

<div class="form-group">
    <label for="url" class="form-label">URL:</label>
    <input type="text" id="url" name="url" placeholder="Type something..." required class="form-input">
</div>

<div class="form-group">
    <span style="color: var(--text-primary);">Warning: Do not run with untrusted URLs, as it may pose a security risk. This may also fail if the website takes too long to load.</span>
</div>

<script>
    // populate form values from plugin settings
    document.addEventListener('DOMContentLoaded', () => {        
        if (loadPluginSettings) {
            document.getElementById('url').value = pluginSettings.url;
            document.getElementById('autoRefresh').value = pluginSettings?.autoRefresh || '5';
        }
    });
</script>
